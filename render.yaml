databases:
  - name: lewizzz-db
    databaseName: lewizzz_db
    user: lewizzz_user
    plan: free

services:
  - type: web
    name: lewizzz-backend
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    healthCheckPath: /admin/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lewizzz-db
          property: connectionString

      - key: SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: false

      - key: ALLOWED_HOSTS
        value: ".onrender.com"

      - key: PYTHON_VERSION
        value: "3.11.0"

      # CORS — update this to your actual Vercel/Netlify frontend URL after deploy
      - key: CORS_ALLOWED_ORIGINS
        value: "https://lewizzz.vercel.app,http://localhost:3000"

      # M-PESA — fill these in on the Render dashboard
      - key: MPESA_CONSUMER_KEY
        sync: false

      - key: MPESA_CONSUMER_SECRET
        sync: false

      - key: MPESA_TILL_NUMBER
        sync: false

      - key: MPESA_SHORTCODE
        sync: false

      - key: MPESA_PASSKEY
        sync: false

      - key: MPESA_CALLBACK_URL
        sync: false

      - key: MPESA_ENV
        value: "production"
